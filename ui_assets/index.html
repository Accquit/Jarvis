<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>J.A.R.V.I.S — MARK XXX</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --c: #00d4ff;
      --cm: #007a99;
      --cd: #003344;
      --cdd: #001520;
      --or: #ff6600;
      --ye: #ffcc00;
      --tx: #8ffcff;
      --bg: #000000;
      --pn: #010c10;
    }

    html,
    body {
      width: 984px;
      height: 816px;
      overflow: hidden;
      background: var(--bg);
      color: var(--tx);
      font-family: 'Courier New', monospace;
      user-select: none;
    }

    /* dot grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #001a22 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      width: 984px;
      height: 816px;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    /* ── HEADER ── */
    #hdr {
      position: relative;
      height: 62px;
      background: #00080d;
      border-bottom: 1px solid var(--cm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #hdr-name {
      font-size: 18px;
      font-weight: bold;
      color: var(--c);
      letter-spacing: 4px;
      display: block;
    }

    #hdr-sub {
      font-size: 9px;
      color: var(--cm);
      letter-spacing: 2px;
      display: block;
      text-align: center;
    }

    #badge {
      position: absolute;
      left: 16px;
      font-size: 9px;
      color: var(--cd);
      letter-spacing: 1px;
    }

    #clock {
      position: absolute;
      right: 16px;
      font-size: 14px;
      font-weight: bold;
      color: var(--c);
    }

    /* ── HUD ── */
    #hud {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #hud-svg {
      width: 460px;
      height: 460px;
      overflow: visible;
      filter: drop-shadow(0 0 18px rgba(0, 212, 255, .18));
    }

    /* ring animations */
    .r1 {
      animation: cw 14s linear infinite;
    }

    .r2 {
      animation: ccw 20s linear infinite;
    }

    .r3 {
      animation: cw 9s linear infinite;
    }

    .sc {
      animation: cw 4s linear infinite;
    }

    .so {
      animation: ccw 5.5s linear infinite;
    }

    /* speaking: faster */
    .speaking .r1 {
      animation-duration: 4s;
    }

    .speaking .r2 {
      animation-duration: 6s;
    }

    .speaking .r3 {
      animation-duration: 2.8s;
    }

    .speaking .sc {
      animation-duration: 1.6s;
    }

    .speaking .so {
      animation-duration: 2.4s;
    }

    @keyframes cw {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    @keyframes ccw {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(-360deg)
      }
    }

    /* glow pulse */
    #glow1 {
      animation: gp 2.2s ease-in-out infinite alternate;
    }

    #glow2 {
      animation: gp 1.6s ease-in-out infinite alternate-reverse;
    }

    .speaking #glow1 {
      animation-duration: .4s;
    }

    .speaking #glow2 {
      animation-duration: .3s;
    }

    @keyframes gp {
      from {
        opacity: .25
      }

      to {
        opacity: .7
      }
    }

    /* face glow */
    #face-ring {
      animation: fr 2s ease-in-out infinite alternate;
    }

    .speaking #face-ring {
      animation-duration: .35s;
    }

    @keyframes fr {
      from {
        stroke-opacity: .5;
        stroke-width: 2
      }

      to {
        stroke-opacity: 1;
        stroke-width: 4
      }
    }

    /* ── STATUS ── */
    #stat-area {
      height: 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
    }

    #stat-txt {
      font-size: 11px;
      font-weight: bold;
      color: var(--c);
      letter-spacing: 3px;
      transition: color .3s;
    }

    #stat-txt.speaking {
      color: var(--or);
    }

    #waveform {
      width: 256px;
      height: 18px;
    }

    /* ── LOG ── */
    #log-wrap {
      margin: 0 auto 8px;
      width: 710px;
      height: 138px;
      background: rgba(1, 12, 16, .9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--cm);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }

    #log {
      height: 100%;
      overflow-y: auto;
      padding: 6px 12px;
      font-size: 10px;
      line-height: 1.6;
      word-break: break-word;
    }

    #log::-webkit-scrollbar {
      width: 4px;
    }

    #log::-webkit-scrollbar-thumb {
      background: var(--cd);
      border-radius: 2px;
    }

    .ly {
      color: #e0e0e0;
    }

    .lj {
      color: var(--c);
    }

    .ls {
      color: var(--ye);
    }

    /* ── FOOTER ── */
    #ftr {
      height: 28px;
      background: #00080d;
      border-top: 1px solid var(--cd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: var(--cd);
      letter-spacing: 2px;
      flex-shrink: 0;
    }

    /* ── API MODAL ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .85);
      backdrop-filter: blur(10px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    #modal.on {
      display: flex;
    }

    #mcard {
      background: #00080d;
      border: 1px solid var(--c);
      padding: 36px 44px;
      min-width: 420px;
      text-align: center;
      box-shadow: 0 0 60px rgba(0, 212, 255, .25);
    }

    #mcard h2 {
      color: var(--c);
      font-size: 13px;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    #mcard p {
      color: var(--cm);
      font-size: 9px;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    #mlbl {
      display: block;
      color: var(--cd);
      font-size: 9px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    #mkey {
      width: 100%;
      background: #000d12;
      border: none;
      border-bottom: 1px solid var(--cd);
      color: var(--tx);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 8px 4px;
      outline: none;
      margin-bottom: 22px;
      letter-spacing: 1px;
      transition: border-color .2s;
    }

    #mkey:focus {
      border-color: var(--c);
    }

    #mbtn {
      background: transparent;
      color: var(--c);
      border: 1px solid var(--c);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 10px 28px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background .2s, box-shadow .2s;
    }

    #mbtn:hover {
      background: var(--cdd);
      box-shadow: 0 0 16px rgba(0, 212, 255, .3);
    }

    /* scan line sweep */
    #app::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(0, 212, 255, .06);
      animation: scan 6s linear infinite;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes scan {
      from {
        top: 0
      }

      to {
        top: 816px
      }
    }

    /* ── SLEEPING STATE ── */
    #hud {
      transition: opacity .6s ease;
    }

    #app.sleeping #hud {
      opacity: .22;
    }

    #app.sleeping #stat-area {
      opacity: .5;
    }

    #stat-area {
      transition: opacity .6s ease;
    }

    #wake-hint {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--cm);
      margin-top: 4px;
      opacity: 0;
      transition: opacity .6s ease;
      animation: none;
    }

    #app.sleeping #wake-hint {
      opacity: 1;
      animation: hw 2s ease-in-out infinite alternate;
    }

    @keyframes hw {
      from {
        color: var(--cd)
      }

      to {
        color: var(--c);
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- HEADER -->
    <div id="hdr">
      <span id="badge">MARK XXX</span>
      <div>
        <span id="hdr-name">J.A.R.V.I.S</span>
        <span id="hdr-sub">Just A Rather Very Intelligent System</span>
      </div>
      <span id="clock">--:--:--</span>
    </div>

    <!-- HUD -->
    <div id="hud">
      <svg id="hud-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="fc">
            <circle cx="250" cy="250" r="148" />
          </clipPath>
          <radialGradient id="og" cx="50%" cy="40%" r="55%">
            <stop offset="0%" stop-color="#00d4ff" stop-opacity=".7" />
            <stop offset="100%" stop-color="#001520" stop-opacity=".1" />
          </radialGradient>
          <filter id="gf">
            <feGaussianBlur stdDeviation="8" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <!-- glow halos -->
        <circle id="glow1" cx="250" cy="250" r="168" fill="none" stroke="#00d4ff" stroke-width="1" filter="url(#gf)"
          opacity=".4" />
        <circle id="glow2" cx="250" cy="250" r="155" fill="none" stroke="#00d4ff" stroke-width="30" opacity=".04" />

        <!-- RING 1 outer -->
        <g class="r1" style="transform-origin:250px 250px">
          <circle cx="250" cy="250" r="222" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="110 128"
            opacity=".85" />
        </g>
        <!-- RING 2 mid counter -->
        <g class="r2" style="transform-origin:250px 250px">
          <circle cx="250" cy="250" r="186" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="76 95"
            opacity=".7" />
        </g>
        <!-- RING 3 inner -->
        <g class="r3" style="transform-origin:250px 250px">
          <circle cx="250" cy="250" r="150" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="56 68"
            opacity=".55" />
        </g>

        <!-- SCAN ARC cyan -->
        <g class="sc" style="transform-origin:250px 250px">
          <circle cx="250" cy="250" r="230" fill="none" stroke="#00d4ff" stroke-width="3" stroke-dasharray="85 1360"
            opacity=".95" />
        </g>
        <!-- SCAN ARC orange counter -->
        <g class="so" style="transform-origin:250px 250px">
          <circle cx="250" cy="250" r="230" fill="none" stroke="#ff6600" stroke-width="2" stroke-dasharray="52 1393"
            opacity=".65" />
        </g>

        <!-- tick marks -->
        <g id="ticks" opacity=".45"></g>

        <!-- crosshairs -->
        <line x1="48" y1="250" x2="102" y2="250" stroke="#00d4ff" stroke-width="1" opacity=".35" />
        <line x1="398" y1="250" x2="452" y2="250" stroke="#00d4ff" stroke-width="1" opacity=".35" />
        <line x1="250" y1="48" x2="250" y2="102" stroke="#00d4ff" stroke-width="1" opacity=".35" />
        <line x1="250" y1="398" x2="250" y2="452" stroke="#00d4ff" stroke-width="1" opacity=".35" />

        <!-- corner brackets -->
        <path d="M26 52 L26 26 L52 26" fill="none" stroke="#00d4ff" stroke-width="2" opacity=".55" />
        <path d="M448 26 L474 26 L474 52" fill="none" stroke="#00d4ff" stroke-width="2" opacity=".55" />
        <path d="M26 448 L26 474 L52 474" fill="none" stroke="#00d4ff" stroke-width="2" opacity=".55" />
        <path d="M474 448 L474 474 L448 474" fill="none" stroke="#00d4ff" stroke-width="2" opacity=".55" />

        <!-- face area -->
        <circle cx="250" cy="250" r="148" fill="#00080e" opacity=".9" />
        <image id="fimg" x="102" y="102" width="296" height="296" clip-path="url(#fc)"
          preserveAspectRatio="xMidYMid slice" />
        <!-- orb shown when no face -->
        <circle id="orb" cx="250" cy="250" r="120" fill="url(#og)" opacity="0" />
        <text id="orb-txt" x="250" y="254" text-anchor="middle" dominant-baseline="middle"
          font-family="'Courier New',monospace" font-size="14" font-weight="bold" fill="#00d4ff"
          opacity="0">J.A.R.V.I.S</text>

        <!-- face border glow ring -->
        <circle id="face-ring" cx="250" cy="250" r="148" fill="none" stroke="#00d4ff" stroke-width="2"
          stroke-opacity=".7" />
      </svg>
    </div>

    <!-- STATUS -->
    <div id="stat-area">
      <div id="stat-txt">● INITIALISING</div>
      <canvas id="waveform" width="256" height="18"></canvas>
      <div id="wake-hint">▸ SAY: HEY JARVIS ◂</div>
    </div>

    <!-- CHAT LOG -->
    <div id="log-wrap">
      <div id="log"></div>
    </div>

    <!-- FOOTER -->
    <div id="ftr">FatihMakes Industries &nbsp;·&nbsp; CLASSIFIED &nbsp;·&nbsp; MARK XXX</div>

  </div><!-- #app -->

  <!-- API KEY MODAL -->
  <div id="modal">
    <div id="mcard">
      <h2>◈ INITIALISATION REQUIRED</h2>
      <p>Enter your Gemini API key to boot J.A.R.V.I.S.</p>
      <span id="mlbl">GEMINI API KEY</span>
      <input id="mkey" type="password" placeholder="AIza..." autocomplete="off" />
      <br>
      <button id="mbtn" onclick="J.submitKey()">▸ INITIALISE SYSTEMS</button>
    </div>
  </div>

  <script>
    const J = (() => {
      let speaking = false, blink = true, statLabel = 'INITIALISING';
      let tq = [], typing = false;
      let wCtx, wPhase = 0;
      let appEl;

      // ── INIT ──────────────────────────────────────────────
      function init() {
        appEl = document.getElementById('app');
        wCtx = document.getElementById('waveform').getContext('2d');

        genTicks();
        tickClock();
        setInterval(tickClock, 1000);
        setInterval(blinkStat, 700);
        rAF(wave);

        document.getElementById('mkey').addEventListener('keydown', e => {
          if (e.key === 'Enter') submitKey();
        });
      }

      // ── TICK MARKS ────────────────────────────────────────
      function genTicks() {
        const g = document.getElementById('ticks');
        let h = '';
        for (let d = 0; d < 360; d += 10) {
          const r = (d - 90) * Math.PI / 180;
          const major = d % 30 === 0;
          const ro = 236, ri = major ? 224 : 229;
          const x1 = (250 + ro * Math.cos(r)).toFixed(1);
          const y1 = (250 + ro * Math.sin(r)).toFixed(1);
          const x2 = (250 + ri * Math.cos(r)).toFixed(1);
          const y2 = (250 + ri * Math.sin(r)).toFixed(1);
          h += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#00d4ff" stroke-width="${major ? 1.5 : .8}"/>`;
        }
        g.innerHTML = h;
      }

      // ── CLOCK ─────────────────────────────────────────────
      function tickClock() {
        const n = new Date();
        document.getElementById('clock').textContent =
          `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
      }
      function pad(v) { return String(v).padStart(2, '0'); }

      // ── STATUS ────────────────────────────────────────────
      function blinkStat() {
        if (speaking) return;
        blink = !blink;
        document.getElementById('stat-txt').textContent = `${blink ? '●' : '○'} ${statLabel}`;
      }

      function setStatus(label) {
        statLabel = label;
        if (!speaking) document.getElementById('stat-txt').textContent = `● ${label}`;
      }

      // ── SPEAKING ──────────────────────────────────────────────────────────────
      function setSpeaking(val) {
        speaking = val;
        const el = document.getElementById('stat-txt');
        if (val) {
          appEl.classList.add('speaking');
          el.textContent = '● SPEAKING';
          el.className = 'speaking';
        } else {
          appEl.classList.remove('speaking');
          el.className = '';
          statLabel = 'ONLINE';
        }
      }

      // ── SLEEPING ──────────────────────────────────────────────────────────────
      function setSleeping(val) {
        if (val) {
          appEl.classList.add('sleeping');
          statLabel = 'STANDBY';
        } else {
          appEl.classList.remove('sleeping');
          statLabel = 'ONLINE';
        }
      }

      // ── WAVEFORM ──────────────────────────────────────────
      function wave() {
        const N = 32, BH = 18, bw = 7, tw = N * bw, x0 = (256 - tw) / 2;
        wCtx.clearRect(0, 0, 256, 18);
        for (let i = 0; i < N; i++) {
          const h = speaking
            ? Math.max(3, Math.floor(Math.random() * BH))
            : Math.max(3, 3 + Math.round(2.5 * Math.sin(wPhase + i * 0.55)));
          wCtx.fillStyle = speaking ? (h > BH * .6 ? '#00d4ff' : '#007a99') : '#003344';
          wCtx.fillRect(x0 + i * bw, BH - h, bw - 1, h);
        }
        wPhase += speaking ? 0.28 : 0.07;
        rAF(wave);
      }

      function rAF(fn) { requestAnimationFrame(fn); }

      // ── FACE ──────────────────────────────────────────────
      function setFace(b64) {
        document.getElementById('fimg').setAttribute('href', b64);
        document.getElementById('orb').setAttribute('opacity', '0');
        document.getElementById('orb-txt').setAttribute('opacity', '0');
      }

      function showOrb() {
        document.getElementById('orb').setAttribute('opacity', '1');
        document.getElementById('orb-txt').setAttribute('opacity', '1');
      }

      // ── CHAT LOG ──────────────────────────────────────────
      function addLog(text) {
        tq.push(text);
        const tl = text.toLowerCase();
        if (tl.startsWith('you:')) setStatus('PROCESSING');
        else if (tl.startsWith('jarvis:')) setStatus('RESPONDING');
        if (!typing) startTyping();
      }

      function startTyping() {
        if (!tq.length) { typing = false; return; }
        typing = true;
        const text = tq.shift();
        const tl = text.toLowerCase();
        const cls = tl.startsWith('you:') ? 'ly' : tl.startsWith('jarvis:') ? 'lj' : 'ls';
        const span = document.createElement('span');
        span.className = cls;
        document.getElementById('log').appendChild(span);
        typeChar(span, text, 0);
      }

      function typeChar(el, txt, i) {
        if (i < txt.length) {
          el.textContent += txt[i];
          document.getElementById('log').scrollTop = 9999;
          setTimeout(() => typeChar(el, txt, i + 1), 7);
        } else {
          document.getElementById('log').appendChild(document.createElement('br'));
          setTimeout(startTyping, 20);
        }
      }

      // ── API KEY MODAL ─────────────────────────────────────
      function showApiSetup() { document.getElementById('modal').classList.add('on'); }
      function hideApiSetup() { document.getElementById('modal').classList.remove('on'); }

      function submitKey() {
        const key = (document.getElementById('mkey').value || '').trim();
        if (!key) return;
        if (window.pywebview) {
          window.pywebview.api.save_api_key(key);
        }
      }

      return { init, setFace, showOrb, addLog, setStatus, setSpeaking, setSleeping, showApiSetup, hideApiSetup, submitKey };
    })();

    document.addEventListener('DOMContentLoaded', J.init);
  </script>
</body>

</html>
